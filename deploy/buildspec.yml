version: 0.2

phases:
  pre_build:
    commands:
      - COMMIT_HASH=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c 1-40)
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/voice-agent-demo"
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$ECR_URI"
      - echo "$COMMIT_HASH" > VERSION
  build:
    commands:
      - docker build -t voice-agent-demo:"$COMMIT_HASH" .
      - docker tag voice-agent-demo:"$COMMIT_HASH" "$ECR_URI":"$COMMIT_HASH"
      - docker tag voice-agent-demo:"$COMMIT_HASH" "$ECR_URI":latest
  post_build:
    commands:
      - docker push "$ECR_URI":"$COMMIT_HASH"
      - docker push "$ECR_URI":latest
artifacts:
  files:
    - deploy/taskdef.json
    - deploy/deploy.sh
    - VERSION
